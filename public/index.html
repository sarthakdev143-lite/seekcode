<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeekCode GUI</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>🧠 SeekCode Agent</h1>
            <div id="status" class="disconnected">⚪ Disconnected</div>
        </header>
        <main id="chat-container">
            <div id="messages"></div>
            <div id="input-area">
                <textarea id="prompt-input" rows="3" placeholder="Describe your coding task..."></textarea>
                <button id="send-btn">Send</button>
            </div>
        </main>
    </div>
    <script src="/app.js"></script>
</body>
</html>
